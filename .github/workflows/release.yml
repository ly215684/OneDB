name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux system dependencies ──
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Rust ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Rust cache ──
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Install npm dependencies ──
      - name: Install dependencies
        run: npm ci

      # ── Build & bundle ──
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OneDB ${{ github.ref_name }}'
          releaseBody: |
            ## OneDB ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `.exe` (NSIS installer), `.msi`, or `onedb-portable-*-windows-x64.exe` (免安装版) |
            | macOS    | `.dmg` (Apple Silicon & Intel) |
            | Linux    | `.deb` or `.AppImage` |

            See assets below for download links.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # ── Windows portable build ──
      - name: Create portable executable (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item "src-tauri\target\release\onedb.exe" "onedb-portable-${{ github.ref_name }}-windows-x64.exe"

      # ── Upload portable to release ──
      - name: Upload portable release asset
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: onedb-portable-${{ github.ref_name }}-windows-x64.exe
